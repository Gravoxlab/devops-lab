services:

  app:
    build: ./app

    ports:
      - "5000:5000"

    environment:
      DB_HOST: db
      DB_NAME: myapp
      DB_USER: admin
      DB_PASSWORD: secret123

    depends_on:
      - db

  db:
    image: postgres:15

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: myapp

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
