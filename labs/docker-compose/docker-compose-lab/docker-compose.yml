version: "3.9"

services:
  app1:
    build: ./app1
    ports:
      - "8001:80"

  app2:
    build: ./app2
    ports:
      - "8002:80"

  app3:
    build: ./app3
    ports:
      - "8003:80"

  nginx:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx-default.conf:/etc/nginx-conf.d/default.conf

